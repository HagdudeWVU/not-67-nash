<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>67?</title>
</head>
<body>
    <h1>Is Nash 67 today?</h1>
    <script>
        const messages = [
            "No",
            "Yes",
        ];

        function setDailyMessage() {
            const now = new Date();
            const start = new Date(now.getFullYear(), 0, 0);
            const diff = now - start;
            const oneDay = 1000 * 60 * 60 * 24;
            const dayOfYear = Math.floor(diff / oneDay);

            const index = dayOfYear % messages.length;
            
            document.getElementById("daily-quote").innerText = messages[index];
        }

        setDailyMessage();
    </script>
    <br>
    <a href="game/game_redirect_page.html">Games</a>
</body>
</html>
